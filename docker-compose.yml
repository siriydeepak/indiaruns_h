version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - EMBEDDING_MODEL_NAME=all-MiniLM-L6-v2
      - WEIGHT_SEMANTIC_FIT=0.60
      - WEIGHT_BEHAVIORAL_SIGNAL=0.40
    volumes:
      - ./backend/app:/code/app
      - hf_cache:/root/.cache/huggingface

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  hf_cache:
